name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-cf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_SESSION_SECRET: ${{ secrets.CF_SESSION_SECRET }}
      CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
      CF_D1_DATABASE_NAME: ${{ vars.CF_D1_DATABASE_NAME }}
      CF_R2_BUCKET_NAME: ${{ vars.CF_R2_BUCKET_NAME }}
      CF_R2_PREVIEW_BUCKET_NAME: ${{ vars.CF_R2_PREVIEW_BUCKET_NAME }}
      CF_MAIL_DOMAIN: ${{ vars.CF_MAIL_DOMAIN }}
      CF_SITE_URL: ${{ vars.CF_SITE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Preflight check required secrets
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${CLOUDFLARE_API_TOKEN:-}" ] || { echo "::error::Missing CLOUDFLARE_API_TOKEN"; exit 1; }
          [ -n "${CLOUDFLARE_ACCOUNT_ID:-}" ] || { echo "::error::Missing CLOUDFLARE_ACCOUNT_ID"; exit 1; }
          [ -n "${CF_SESSION_SECRET:-}" ] || { echo "::error::Missing CF_SESSION_SECRET"; exit 1; }
          echo "Preflight check passed."

      - name: Install dependencies (skip postinstall in CI)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Resolve D1/R2 resources (auto find or create)
        shell: bash
        run: |
          set -euo pipefail

          D1_NAME="${CF_D1_DATABASE_NAME:-smail-database}"
          R2_BUCKET_NAME="${CF_R2_BUCKET_NAME:-smail-attachments}"
          R2_PREVIEW_BUCKET_NAME="${CF_R2_PREVIEW_BUCKET_NAME:-smail-attachments-preview}"
          MAIL_DOMAIN="${CF_MAIL_DOMAIN:-example.com}"
          SITE_URL="${CF_SITE_URL:-https://mail.example.com}"

          CF_API_ROOT="https://api.cloudflare.com/client/v4"
          CF_API_BASE="${CF_API_ROOT}/accounts/${CLOUDFLARE_ACCOUNT_ID}"

          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::error::Missing secret CLOUDFLARE_API_TOKEN" >&2
            exit 1
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::error::Missing secret CLOUDFLARE_ACCOUNT_ID" >&2
            exit 1
          fi

          AUTH="Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"

          # --- D1 ---
          if [ -n "${CF_D1_DATABASE_ID:-}" ]; then
            D1_ID="$CF_D1_DATABASE_ID"
            echo "Using provided D1 ID: $D1_ID"
          else
            echo "Searching for D1 database: $D1_NAME"
            D1_LIST=$(curl -sf -H "$AUTH" "${CF_API_BASE}/d1/database?name=${D1_NAME}&per_page=10")
            D1_ID=$(echo "$D1_LIST" | jq -r '.result[0].uuid // empty')
            if [ -z "$D1_ID" ]; then
              echo "Creating D1 database: $D1_NAME"
              D1_CREATE=$(curl -sf -X POST -H "$AUTH" -H "Content-Type: application/json" \
                -d "{\"name\":\"${D1_NAME}\"}" "${CF_API_BASE}/d1/database")
              D1_ID=$(echo "$D1_CREATE" | jq -r '.result.uuid')
              [ -n "$D1_ID" ] || { echo "::error::Failed to create D1"; exit 1; }
              echo "Created D1: $D1_ID"
            else
              echo "Found D1: $D1_ID"
            fi
          fi

          # --- R2 ---
          for BUCKET in "$R2_BUCKET_NAME" "$R2_PREVIEW_BUCKET_NAME"; do
            echo "Checking R2 bucket: $BUCKET"
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" -H "$AUTH" "${CF_API_BASE}/r2/buckets/${BUCKET}")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "R2 bucket exists: $BUCKET"
            else
              echo "Creating R2 bucket: $BUCKET"
              curl -sf -X POST -H "$AUTH" -H "Content-Type: application/json" \
                -d "{\"name\":\"${BUCKET}\"}" "${CF_API_BASE}/r2/buckets" > /dev/null
              echo "Created R2 bucket: $BUCKET"
            fi
          done

          # --- Export ---
          {
            echo "D1_ID=$D1_ID"
            echo "D1_NAME=$D1_NAME"
            echo "R2_BUCKET_NAME=$R2_BUCKET_NAME"
            echo "R2_PREVIEW_BUCKET_NAME=$R2_PREVIEW_BUCKET_NAME"
            echo "MAIL_DOMAIN=$MAIL_DOMAIN"
            echo "SITE_URL=$SITE_URL"
          } >> "$GITHUB_ENV"

      - name: Generate wrangler.jsonc from template
        run: |
          cp wrangler.example.jsonc wrangler.jsonc
          sed -i "s|YOUR_D1_DATABASE_ID_HERE|${D1_ID}|g" wrangler.jsonc
          sed -i "s|__MAIL_DOMAIN__|${MAIL_DOMAIN}|g" wrangler.jsonc
          sed -i "s|__SITE_URL__|${SITE_URL}|g" wrangler.jsonc

      - name: Run typecheck
        run: pnpm run typecheck

      - name: Apply D1 migrations (remote)
        run: pnpm wrangler d1 migrations apply "${D1_NAME}" --remote

      - name: Deploy
        run: pnpm run deploy

      - name: Sync Worker secret (SESSION_SECRET)
        run: |
          echo "${CF_SESSION_SECRET}" | pnpm wrangler secret put SESSION_SECRET

      - name: Deployment summary
        if: always()
        run: |
          echo "MAIL_DOMAIN: ${MAIL_DOMAIN:-unknown}"
          echo "SITE_URL: ${SITE_URL:-unknown}"
          echo "D1 database id: ${D1_ID:-unknown}"
          echo "D1 database name: ${D1_NAME:-unknown}"
          echo "R2 bucket: ${R2_BUCKET_NAME:-unknown}"
          echo "R2 preview bucket: ${R2_PREVIEW_BUCKET_NAME:-unknown}"
          echo "Done."
